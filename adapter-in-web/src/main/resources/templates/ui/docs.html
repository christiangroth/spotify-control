{#include layout.html}
    {#title}SpCtl – {title}{/title}
    {#navLinks}
    {#if showDocsLink}<a href="/ui/docs/arc42" class="nav-link text-white me-3" data-testid="docs-link">Docs</a>{/if}
    {#if showAdrLink}<a href="/ui/docs/adr" class="nav-link text-white me-3" data-testid="adrs-link">ADRs</a>{/if}
    <a href="/logout" class="btn btn-sm btn-outline-secondary" data-testid="logout-link">Logout</a>
    {/navLinks}
    {#content}
    <div class="container py-4">
        <h1 class="mb-4 fs-4 fw-semibold">{title}</h1>
        <div id="docs-rendered" class="docs-content"></div>
        <textarea id="docs-raw" class="d-none">{markdownContent}</textarea>
    </div>
    <script>
        document.getElementById('docs-rendered').innerHTML =
            marked.parse(document.getElementById('docs-raw').value);
    </script>
    {/content}
{/include}
