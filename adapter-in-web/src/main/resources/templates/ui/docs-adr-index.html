{#include layout.html}
    {#title}SpCtl – {title}{/title}
    {#navLinks}
    <a href="/ui/docs/arc42" class="nav-link text-white me-3" data-testid="docs-link">Docs</a>
    <a href="/logout" class="btn btn-sm btn-outline-secondary" data-testid="logout-link">Logout</a>
    {/navLinks}
    {#content}
    <div class="container py-4">
        <h1 class="mb-4 fs-4 fw-semibold">{title}</h1>
        <ul class="list-unstyled" data-testid="adr-list">
            {#for adr in adrs}
            <li class="mb-2">
                <a href="/ui/docs/adr/{adr.filename}" class="text-decoration-none" data-testid="adr-link">{adr.title}</a>
            </li>
            {/for}
        </ul>
    </div>
    {/content}
{/include}
