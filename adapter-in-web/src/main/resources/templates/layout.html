<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{#insert title}SpCtl{/insert}</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css">
    <style>
        :root {
            --spotify-green: #1db954;
        }
        body {
            background-color: #121212;
            color: #e0e0e0;
        }
        .app-navbar {
            background-color: #000000;
        }
        .app-navbar .app-name {
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 0.04em;
        }
        .app-navbar .app-version {
            color: #888888;
            font-size: 0.8rem;
        }
        .btn-spotify {
            background-color: var(--spotify-green);
            color: #000000;
            font-weight: 600;
            border: none;
            border-radius: 500px;
        }
        .btn-spotify:hover {
            background-color: #1ed760;
            color: #000000;
        }
        .docs-content h1, .docs-content h2, .docs-content h3 {
            color: #e0e0e0;
            border-bottom: 1px solid #333333;
            padding-bottom: 0.3em;
            margin-top: 1.5em;
        }
        .docs-content code {
            background-color: #1e1e1e;
            padding: 0.1em 0.4em;
            border-radius: 3px;
            font-family: monospace;
        }
        .docs-content pre {
            background-color: #1e1e1e;
            padding: 1em;
            border-radius: 4px;
            overflow-x: auto;
        }
        .docs-content pre code {
            background: none;
            padding: 0;
        }
        .docs-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1em;
        }
        .docs-content th, .docs-content td {
            border: 1px solid #333333;
            padding: 0.5em 0.75em;
        }
        .docs-content th {
            background-color: #1e1e1e;
        }
        .docs-content a {
            color: var(--spotify-green);
        }
        .docs-content {
            max-width: 860px;
        }
    </style>
</head>
<body>
    <nav class="app-navbar d-flex align-items-center px-3 py-2">
        <a href="/" class="d-flex align-items-center text-decoration-none me-2">
            <img src="/favicon.svg" alt="SpCtl Logo" width="24" height="24" class="me-2">
            <span class="app-name">SpCtl</span>
        </a>
        {#insert appVersion}<a href="/ui/docs/releasenotes" class="app-version me-auto text-decoration-none" data-testid="version-link">{appBuildVersion}</a>{/insert}
        {#insert navLinks}
        <a href="/ui/docs/arc42" class="nav-link text-white me-3" data-testid="docs-link" title="Docs"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M1 2.828c.885-.37 2.154-.769 3.388-.893 1.33-.134 2.458.063 3.112.752v9.746c-.935-.53-2.12-.603-3.213-.493-1.18.12-2.37.461-3.287.811zm7.5-.141c.654-.689 1.782-.886 3.112-.752 1.234.124 2.503.523 3.388.893v9.923c-.918-.35-2.107-.692-3.287-.81-1.094-.111-2.278-.039-3.213.492zM8 1.783C7.015.936 5.587.81 4.287.94c-1.514.153-3.042.672-3.994 1.105A.5.5 0 0 0 0 2.5v11a.5.5 0 0 0 .707.455c.882-.4 2.303-.881 3.68-1.02 1.409-.142 2.59.087 3.223.877a.5.5 0 0 0 .78 0c.633-.79 1.814-1.019 3.222-.877 1.378.139 2.8.62 3.681 1.02A.5.5 0 0 0 16 13.5v-11a.5.5 0 0 0-.293-.455c-.952-.433-2.48-.952-3.994-1.105C10.413.809 8.985.936 8 1.783"/></svg></a>
        <a href="/logout" class="btn btn-sm btn-outline-secondary" data-testid="logout-link">Logout</a>
        {/insert}
    </nav>
    <script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/webjars/marked/lib/marked.umd.js"></script>
    {#insert content /}
</body>
</html>
