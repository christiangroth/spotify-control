<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{#insert title}SpCtl{/insert}</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css">
    <style>
        :root {
            --spotify-green: #1db954;
        }
        body {
            background-color: #121212;
            color: #e0e0e0;
        }
        .app-navbar {
            background-color: #000000;
        }
        .app-navbar .app-name {
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 0.04em;
        }
        .app-navbar .app-version {
            color: #888888;
            font-size: 0.8rem;
        }
        .btn-spotify {
            background-color: var(--spotify-green);
            color: #000000;
            font-weight: 600;
            border: none;
            border-radius: 500px;
        }
        .btn-spotify:hover {
            background-color: #1ed760;
            color: #000000;
        }
        .docs-content h1, .docs-content h2, .docs-content h3 {
            color: #e0e0e0;
            border-bottom: 1px solid #333333;
            padding-bottom: 0.3em;
            margin-top: 1.5em;
        }
        .docs-content code {
            background-color: #1e1e1e;
            padding: 0.1em 0.4em;
            border-radius: 3px;
            font-family: monospace;
        }
        .docs-content pre {
            background-color: #1e1e1e;
            padding: 1em;
            border-radius: 4px;
            overflow-x: auto;
        }
        .docs-content pre code {
            background: none;
            padding: 0;
        }
        .docs-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1em;
        }
        .docs-content th, .docs-content td {
            border: 1px solid #333333;
            padding: 0.5em 0.75em;
        }
        .docs-content th {
            background-color: #1e1e1e;
        }
        .docs-content a {
            color: var(--spotify-green);
        }
        .docs-content {
            max-width: 860px;
        }
    </style>
</head>
<body>
    <nav class="app-navbar d-flex align-items-center px-3 py-2">
        <a href="/" class="d-flex align-items-center text-decoration-none me-2">
            <img src="/favicon.svg" alt="SpCtl Logo" width="24" height="24" class="me-2">
            <span class="app-name">SpCtl</span>
        </a>
        {#insert appVersion}<a href="/ui/docs/releasenotes/RELEASENOTES.md" class="app-version me-2 text-decoration-none" data-testid="version-link">{appBuildVersion}</a>{/insert}
        {#insert leftNavLinks}<a href="/ui/settings" class="nav-link text-white me-auto" data-testid="settings-link" title="Playlists"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M2.5 3.5a.5.5 0 0 1 0-1h11a.5.5 0 0 1 0 1zm2-2a.5.5 0 0 1 0-1h7a.5.5 0 0 1 0 1zM0 13a1.5 1.5 0 0 0 1.5 1.5h13A1.5 1.5 0 0 0 16 13V6a1.5 1.5 0 0 0-1.5-1.5h-13A1.5 1.5 0 0 0 0 6zm6.854-3.646 3-1.5a.5.5 0 0 0 0-.708l-3-1.5A.5.5 0 0 0 6 6v3a.5.5 0 0 0 .854.354"/></svg></a>{/insert}

        {/insert}
    </nav>
    <script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
