{#include layout.html}
    {#title}SpCtl – Config{/title}
    {#content}
    <div class="container-fluid py-4 px-3 px-md-4">

        <h1 class="mb-4 fs-4 fw-semibold">Configuration</h1>

        <div id="config-section">
            <div class="row g-3 mb-4">
                <div class="col-12">
                    <div class="card h-100" style="background-color:#1e1e1e;border-color:#333;">
                        <div class="card-body">
                            <p class="card-subtitle mb-3" style="color:#888;font-size:.8rem;">Environment</p>
                            <div class="table-responsive">
                                <table class="table table-sm mb-0" style="color:#e0e0e0;background-color:transparent;" data-testid="env-table">
                                    <thead>
                                        <tr style="border-color:#333;">
                                            <th style="border-color:#333;color:#888;font-weight:400;background-color:transparent;">Key</th>
                                            <th style="border-color:#333;color:#888;font-weight:400;background-color:transparent;">Value</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {#for entry in stats.envEntries}
                                        <tr style="border-color:#333;">
                                            <td style="border-color:#333;color:#e0e0e0;background-color:transparent;word-break:break-all;">{entry.key}</td>
                                            <td style="border-color:#333;color:#e0e0e0;background-color:transparent;word-break:break-all;">{entry.value}</td>
                                        </tr>
                                        {/for}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row g-3 mb-4">
                <div class="col-12">
                    <div class="card h-100" style="background-color:#1e1e1e;border-color:#333;">
                        <div class="card-body">
                            <p class="card-subtitle mb-3" style="color:#888;font-size:.8rem;">Config</p>
                            <div class="table-responsive">
                                <table class="table table-sm mb-0" style="color:#e0e0e0;background-color:transparent;" data-testid="config-table">
                                    <thead>
                                        <tr style="border-color:#333;">
                                            <th style="border-color:#333;color:#888;font-weight:400;background-color:transparent;">Key</th>
                                            <th style="border-color:#333;color:#888;font-weight:400;background-color:transparent;">Value</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {#for entry in stats.configEntries}
                                        <tr style="border-color:#333;">
                                            <td style="border-color:#333;color:#e0e0e0;background-color:transparent;word-break:break-all;">{entry.key}</td>
                                            <td style="border-color:#333;color:#e0e0e0;background-color:transparent;word-break:break-all;">{entry.value}</td>
                                        </tr>
                                        {/for}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {/content}
{/include}
