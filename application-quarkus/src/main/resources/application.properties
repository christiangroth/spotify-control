# DEV SERVICES
# ------------
quarkus.devservices.enabled=true

# HEALTH
# ------
%dev.quarkus.smallrye-health.include-problem-details=true

# TESTING
# -------
quarkus.test.integration-test-profile=test
# Use fixed port 8081 so test profile config can reference it (e.g. spotify mock base-url)
quarkus.http.test-port=8081

# DOCKER
# ------
quarkus.container-image.builder=docker
quarkus.container-image.build=true
quarkus.container-image.push=false
quarkus.container-image.registry=ghcr.io
quarkus.container-image.group=christiangroth/spotify-control
quarkus.container-image.name=quarkus

# LOGGING
# -------
%prod.quarkus.log.console.json=true
%prod.quarkus.log.console.json.pretty-print=false

# MONGODB
# -------
quarkus.mongodb.application-name=spctl-prod
quarkus.mongodb.database=spotify-control
%prod.quarkus.mongodb.connection-string=${MONGODB_CONNECTION_STRING}
%prod.quarkus.mongodb.metrics.enabled=true

# SPOTIFY OAUTH
# -------------
%prod.spotify.client-id=${SPOTIFY_CLIENT_ID}
%prod.spotify.client-secret=${SPOTIFY_CLIENT_SECRET}
%prod.app.oauth.redirect-uri=${APP_OAUTH_REDIRECT_URI}
%dev.spotify.client-id=dev-client-id
%dev.spotify.client-secret=dev-client-secret
%dev.app.oauth.redirect-uri=http://localhost:8080/oauth/callback
%dev.spotify.accounts.base-url=http://localhost:8080/mock/spotify
%dev.spotify.api.base-url=http://localhost:8080/mock/spotify
%dev.app.mock.spotify.user-id=test-user-a
%test.spotify.client-id=test-client-id
%test.spotify.client-secret=test-client-secret
%test.app.oauth.redirect-uri=http://localhost:8081/oauth/callback
%test.spotify.accounts.base-url=http://localhost:8081/mock/spotify
%test.spotify.api.base-url=http://localhost:8081/mock/spotify
%test.app.mock.spotify.user-id=test-user-a

