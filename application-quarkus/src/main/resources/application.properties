# DEV SERVICES
# ------------
quarkus.devservices.enabled=true
quarkus.mongodb.devservices.show-logs=false

# HEALTH
# ------
%dev.quarkus.smallrye-health.include-problem-details=true

# TESTING
# -------
quarkus.test.integration-test-profile=test

# DOCKER
# ------
quarkus.container-image.builder=docker
quarkus.container-image.build=true
quarkus.container-image.push=false
quarkus.container-image.registry=ghcr.io
quarkus.container-image.group=christiangroth/spotify-control
quarkus.container-image.name=quarkus

# MONGODB
# -------
quarkus.mongodb.database=spotify-control
%prod.quarkus.mongodb.connection-string=${MONGODB_CONNECTION_STRING}

# ALLOW LIST
# ----------
# Required in production: comma-separated list of allowed Spotify user IDs
%prod.app.allowed-spotify-user-ids=${APP_ALLOWED_SPOTIFY_USER_IDS}
%dev.app.allowed-spotify-user-ids=dev-user
%test.app.allowed-spotify-user-ids=test-user
