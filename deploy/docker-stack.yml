version: "3"
services:
  quarkus:
    image: ghcr.io/christiangroth/spotify-control/quarkus:${DOCKER_TAG:?please export DOCKER_TAG}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.spotifycontrol.rule=${TRAEFIK_HTTP_ROUTERS_SPOTIFYCONTROL_RULE:?please export TRAEFIK_HTTP_ROUTERS_SPOTIFYCONTROL_RULE}"
        - "traefik.http.routers.spotifycontrol.entryPoints=websecure"
        - "traefik.http.routers.spotifycontrol.tls=true"
        - "traefik.http.routers.spotifycontrol.tls.certresolver=le"
        - "traefik.http.services.spotifycontrol-svc.loadbalancer.server.port=8080"
        - "traefik.swarm.network=global_router"
    volumes:
      - "/etc/timezone:/etc/timezone:ro"
      - "/etc/localtime:/etc/localtime:ro"
    environment:
      - HTTP_AUTH_ENCRYPTION_KEY=${HTTP_AUTH_ENCRYPTION_KEY:?please export HTTP_AUTH_ENCRYPTION_KEY}
    networks:
      - spotify_control
      - global_router

networks:
  spotify_control:
  global_router:
    external: true
