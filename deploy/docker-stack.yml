version: "3"
services:
  quarkus:
    image: ghcr.io/christiangroth/spotify-control/quarkus:${DOCKER_TAG}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.spotifycontrol.rule=${TRAEFIK_HTTP_ROUTERS_SPOTIFYCONTROL_RULE}"
        - "traefik.http.routers.spotifycontrol.entryPoints=websecure"
        - "traefik.http.routers.spotifycontrol.tls=true"
        - "traefik.http.routers.spotifycontrol.tls.certresolver=le"
        - "traefik.http.services.spotifycontrol-svc.loadbalancer.server.port=8080"
        - "traefik.swarm.network=global_router"
    volumes:
      - "/etc/timezone:/etc/timezone:ro"
      - "/etc/localtime:/etc/localtime:ro"
    environment:
      - QUARKUS_PROFILE=prod
      - MONGODB_HOSTS=${MONGODB_HOSTS}
      - MONGODB_USERNAME=${MONGODB_USERNAME}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_AUTH_SOURCE=${MONGODB_AUTH_SOURCE}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - APP_OAUTH_REDIRECT_URI=${APP_OAUTH_REDIRECT_URI}
      - APP_ALLOWED_SPOTIFY_USER_IDS=${APP_ALLOWED_SPOTIFY_USER_IDS}
      - APP_TOKEN_ENCRYPTION_KEY=${APP_TOKEN_ENCRYPTION_KEY}
      - HTTP_AUTH_ENCRYPTION_KEY=${HTTP_AUTH_ENCRYPTION_KEY}
    networks:
      - spotify_control
      - global_router

  alloy:
    image: grafana/alloy:v1.13.2
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    configs:
      - source: alloy_config
        target: /etc/alloy/config.alloy
    environment:
      - GRAFANA_CLOUD_METRICS_URL=${GRAFANA_CLOUD_METRICS_URL}
      - GRAFANA_CLOUD_METRICS_USERNAME=${GRAFANA_CLOUD_METRICS_USERNAME}
      - GRAFANA_CLOUD_METRICS_API_KEY=${GRAFANA_CLOUD_METRICS_API_KEY}
      - GRAFANA_CLOUD_LOGS_URL=${GRAFANA_CLOUD_LOGS_URL}
      - GRAFANA_CLOUD_LOGS_USERNAME=${GRAFANA_CLOUD_LOGS_USERNAME}
      - GRAFANA_CLOUD_LOGS_API_KEY=${GRAFANA_CLOUD_LOGS_API_KEY}
    networks:
      - spotify_control
    command:
      - run
      - /etc/alloy/config.alloy

configs:
  alloy_config:
    file: ./alloy/config.alloy

networks:
  spotify_control:
  global_router:
    external: true
