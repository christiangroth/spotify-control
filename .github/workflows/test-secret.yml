name: Check Secret Characters

on:
  workflow_dispatch:

jobs:
  check-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Print TEST_SECRET as base64
        env:
          TEST_SECRET: ${{ secrets.TEST_SECRET }}
        run: |
          echo "base64 encoded (decode to inspect characters):"
          echo "$TEST_SECRET"
          echo "$TEST_SECRET"
          echo "length: ${#TEST_SECRET}"
