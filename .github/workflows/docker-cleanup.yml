name: Docker Image Registry Cleanup

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 03:00 UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete old Docker images (keep 3 newest)
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'spotify-control/quarkus'
          package-type: 'container'
          min-versions-to-keep: 3
          token: ${{ secrets.GITHUB_TOKEN }}
