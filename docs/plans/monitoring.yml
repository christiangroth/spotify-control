concept: monitoring
description: >
  Monitoring concept for spotify-control using Grafana Cloud managed services only.
  No Grafana, Prometheus, or Loki instances are self-hosted on the Docker Swarm VPS.
  Grafana Alloy (the OpenTelemetry-native successor to Grafana Agent) runs as a
  lightweight sidecar service in the Docker Swarm and forwards metrics and logs to
  Grafana Cloud.

goals:
  - Metrics dashboard via Grafana Cloud (Prometheus-compatible remote_write)
  - Structured log aggregation via Grafana Cloud Loki
  - Alerting via Grafana Cloud Alerting (sufficient for a solo-developer project)
  - Zero self-hosted observability infrastructure

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:

  - name: grafana-alloy
    description: >
      Grafana Alloy deployed as a single-replica Docker Swarm service on the VPS.
      Scrapes the Quarkus Prometheus metrics endpoint and tails Docker container logs,
      then ships both to Grafana Cloud.
    image: grafana/alloy:latest
    config: alloy/config.alloy  # mounted as a Docker config object

  - name: grafana-cloud
    tier: free-tier-sufficient
    managed_services:
      - name: Grafana (dashboards)
        purpose: Visualise metrics and explore logs
      - name: Prometheus (Mimir)
        purpose: Long-term metrics storage, remote_write endpoint
      - name: Loki
        purpose: Log aggregation and search
      - name: Alerting
        purpose: Alert rules evaluated against Mimir/Loki, routed to Slack and e-mail

# ---------------------------------------------------------------------------
# Metrics
# ---------------------------------------------------------------------------
metrics:
  quarkus_extension: quarkus-micrometer-registry-prometheus  # already in build.gradle.kts
  endpoint: /q/metrics  # Prometheus text format
  scrape_interval: 30s
  collection: Grafana Alloy → prometheus.scrape → prometheus.remote_write → Grafana Cloud Mimir

  proposed_dashboards:
    - name: Application Overview
      panels:
        - HTTP request rate and error rate (5xx/4xx)
        - HTTP request latency (p50/p95/p99)
        - JVM heap and non-heap memory
        - JVM GC pause duration and count
        - Active threads / thread pool utilisation
    - name: Outbox Health
      panels:
        - Outbox queue depth per partition (spotify / domain)
        - Outbox processing rate (events/min)
        - Outbox error / retry count
    - name: Spotify API
      panels:
        - Spotify API requests per minute
        - Spotify API error rate
        - Token bucket fill level / rate-limit events
    - name: Playback & Sync
      panels:
        - Playback events collected (raw / enriched)
        - Playlist sync triggers per day
        - Album upgrade pending count

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  quarkus_extension: quarkus-logging-json  # add to application-quarkus/build.gradle.kts
  format: JSON structured log lines on stdout/stderr
  collection: Grafana Alloy → loki.source.docker → loki.write → Grafana Cloud Loki
  labels:
    - service_name: spotify-control
    - container_name: (from Docker metadata)
    - level: (from JSON log field)
  retention: Grafana Cloud free tier (30 days)

  configuration_note: >
    Enable JSON logging in application.properties:
      %prod.quarkus.log.console.json=true
      %prod.quarkus.log.console.json.pretty-print=false
    Keep human-readable logging in dev/test profiles (default behaviour).

# ---------------------------------------------------------------------------
# Alerting
# ---------------------------------------------------------------------------
alerting:
  engine: Grafana Cloud Alerting
  evaluation_interval: 1m

  notification_channels:
    - name: Slack
      type: Slack Incoming Webhook
      note: Re-use existing SLACK_WEBHOOK_URL secret
    - name: Email
      type: Email (Grafana Cloud contact point)

  alert_rules:
    - name: ApplicationDown
      datasource: Mimir
      condition: No metrics received from spotify-control for > 5 min
      severity: critical
      notify: Slack, Email

    - name: HighHttpErrorRate
      datasource: Mimir
      condition: HTTP 5xx rate > 5 % over a 5-minute window
      severity: warning
      notify: Slack

    - name: OutboxStuck
      datasource: Mimir
      condition: >
        Outbox queue depth for any partition > configured threshold AND
        no decrease observed for 15 minutes
      severity: warning
      notify: Slack

    - name: HighJvmMemory
      datasource: Mimir
      condition: JVM heap usage > 80 % for > 10 min
      severity: warning
      notify: Slack

    - name: SpotifyApiErrors
      datasource: Mimir
      condition: Spotify API error rate > 10 % over a 10-minute window
      severity: warning
      notify: Slack

# ---------------------------------------------------------------------------
# Deployment changes
# ---------------------------------------------------------------------------
deployment:

  new_docker_service:
    name: alloy
    image: grafana/alloy:latest
    replicas: 1
    networks:
      - spotify_control   # must reach quarkus:8080 for metrics scraping
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro   # for Docker log discovery
    configs:
      - source: alloy_config
        target: /etc/alloy/config.alloy
    environment:
      - GRAFANA_CLOUD_METRICS_URL
      - GRAFANA_CLOUD_METRICS_USERNAME
      - GRAFANA_CLOUD_LOGS_URL
      - GRAFANA_CLOUD_LOGS_USERNAME
      - GRAFANA_CLOUD_API_KEY

  new_environment_variables:
    - name: GRAFANA_CLOUD_METRICS_URL
      description: Remote-write URL for Grafana Cloud Prometheus (Mimir), e.g. https://prometheus-prod-XX.grafana.net/api/prom/push
    - name: GRAFANA_CLOUD_METRICS_USERNAME
      description: Numeric user ID for Grafana Cloud Prometheus authentication
    - name: GRAFANA_CLOUD_LOGS_URL
      description: Loki push URL for Grafana Cloud, e.g. https://logs-prod-XXX.grafana.net/loki/api/v1/push
    - name: GRAFANA_CLOUD_LOGS_USERNAME
      description: Numeric user ID for Grafana Cloud Loki authentication
    - name: GRAFANA_CLOUD_API_KEY
      description: Grafana Cloud API key (Publisher role is sufficient); used as password for both Mimir and Loki

  alloy_config_example: |
    // Grafana Alloy config (River syntax)
    // File: deploy/alloy/config.alloy

    // ── Metrics ──────────────────────────────────────────────────────────────
    prometheus.scrape "spotify_control" {
      targets = [{ "__address__" = "quarkus:8080", "__metrics_path__" = "/q/metrics" }]
      scrape_interval = "30s"
      forward_to = [prometheus.remote_write.grafana_cloud.receiver]
    }

    prometheus.remote_write "grafana_cloud" {
      endpoint {
        url = env("GRAFANA_CLOUD_METRICS_URL")
        basic_auth {
          username = env("GRAFANA_CLOUD_METRICS_USERNAME")
          password = env("GRAFANA_CLOUD_API_KEY")
        }
      }
    }

    // ── Logs ─────────────────────────────────────────────────────────────────
    loki.source.docker "spotify_control_logs" {
      host = "unix:///var/run/docker.sock"
      targets = discovery.docker.containers.targets
      forward_to = [loki.write.grafana_cloud.receiver]
    }

    discovery.docker "containers" {
      host = "unix:///var/run/docker.sock"
    }

    loki.write "grafana_cloud" {
      endpoint {
        url = env("GRAFANA_CLOUD_LOGS_URL")
        basic_auth {
          username = env("GRAFANA_CLOUD_LOGS_USERNAME")
          password = env("GRAFANA_CLOUD_API_KEY")
        }
      }
      external_labels = { service_name = "spotify-control" }
    }

# ---------------------------------------------------------------------------
# Implementation steps
# ---------------------------------------------------------------------------
implementation_steps:
  - step: 1
    title: Enable JSON logging
    actions:
      - Add quarkus-logging-json to application-quarkus/build.gradle.kts
      - Set %prod.quarkus.log.console.json=true in application.properties
  - step: 2
    title: Add Grafana Alloy service to Docker stack
    actions:
      - Create deploy/alloy/config.alloy based on alloy_config_example above
      - Add alloy service and Docker config to deploy/docker-stack.yml
  - step: 3
    title: Register secrets
    actions:
      - Add GRAFANA_CLOUD_* variables to the .env file on the VPS
      - Add GRAFANA_CLOUD_* variables as GitHub Actions secrets (for future CI use)
      - Document variable names in docs/plans/deployment.md
  - step: 4
    title: Deploy and verify
    actions:
      - Deploy updated stack; confirm Alloy connects to Grafana Cloud
      - Verify metrics appear in Grafana Cloud Explore (Mimir datasource)
      - Verify logs appear in Grafana Cloud Explore (Loki datasource)
  - step: 5
    title: Create dashboards
    actions:
      - Build dashboards in Grafana Cloud using proposed panels above
      - Export dashboard JSON to deploy/grafana/dashboards/ for version control
  - step: 6
    title: Configure alerting
    actions:
      - Create contact points (Slack, Email) in Grafana Cloud Alerting
      - Define alert rules listed above
      - Test alerts by temporarily lowering thresholds
