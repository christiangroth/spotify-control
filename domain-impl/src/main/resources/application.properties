# ALLOW LIST
# ----------
# Required in production: comma-separated list of allowed Spotify user IDs
%prod.app.allowed-spotify-user-ids=${APP_ALLOWED_SPOTIFY_USER_IDS}
%dev.app.allowed-spotify-user-ids=test-user-a
%test.app.allowed-spotify-user-ids=test-user-a,test-user-b

# TOKEN ENCRYPTION
# ----------------
# Required in production: base64-encoded 32-byte AES-256 key
# Generate with: openssl rand -base64 32
%prod.app.token-encryption-key=${APP_TOKEN_ENCRYPTION_KEY}
# 32 bytes: 0x00..0x1F
%dev.app.token-encryption-key=AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=
%test.app.token-encryption-key=AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=
