# SLACK SYSTEM NOTIFICATIONS
# --------------------------
# Individual toggles for system event notifications (all disabled by default)
app.slack.system-notifications.startup=false
app.slack.system-notifications.stopping=false
app.slack.system-notifications.outbox-partition-paused=false
app.slack.system-notifications.outbox-partition-resumed=false

# Slack incoming webhook URL – set via environment variable in production
%prod.app.slack.webhook-url=${SLACK_WEBHOOK_URL:}
